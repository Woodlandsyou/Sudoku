<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="sudokuContainer"></div>
        <div id="toolbar">
            <div class="toolbarEleContainer">
                <h1><u>Toolbar</u></h1>
            </div>
            <div class="toolbarEleContainer">
                <img class="toolbarEle" src="./img/delete-Icon-2.svg" alt="Delete Icon">
            </div>
            <div class="toolbarEleContainer">
                <img class="toolbarEle" src="./img/insert-Icon.svg" alt="Insert Icon">
            </div>
            <div class="toolbarEleContainer">
                <img class="toolbarEle" src="./img/notes-Icon.svg" alt="Notes Icon">
            </div>

        </div>
    </main>
    <footer>
        <script src="main.js"></script>
    </footer>
</body>
</html>
