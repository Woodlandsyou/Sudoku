<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="sudokuContainer"></div>
        <div id="toolbar">
            <div class="toolbarEleContainer">
                <h1><u>Toolbar</u></h1>
            </div>
            <div class="toolbarEleContainer">
                <object class="toolbarEle" data="./img/delete-Icon-2.svg" type="image/svg+xml">
                    <p>Delete Icon</p>
                </object>
            </div>
            <div class="toolbarEleContainer">
                <object class="toolbarEle" data="./img/insert-Icon.svg" type="image/svg+xml">
                    <p>Insert Icon</p>
                </object>
            </div>
            <div class="toolbarEleContainer">
                <object class="toolbarEle" data="./img/notes-Icon.svg" type="image/svg+xml">
                    <p>Notes Icon</p>
                </object>
            </div>

        </div>
    </main>
    <footer>
        <script src="main.js"></script>
    </footer>
</body>
</html>
